name: Build, Push and Deploy to Dev

on:
  push:
    branches:
      - master

jobs:
  debug:
    name: Debug files
    runs-on: ubuntu-latest
    steps:
      - name: List workspace
        run: |
          ls -la
          ls -la Backend

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v5

      # 🔐 Docker login
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build image (IMPORTANT: unique tag)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend:${{ github.sha }} ./Backend

      # 📦 Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend:${{ github.sha }}

      # ☸️ Setup kubeconfig
      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # 🚀 Deploy ONLY to DEV
      - name: Deploy to Dev
        run: |
          helm upgrade --install backend-dev ./helm \
          --namespace dev \
          --create-namespace \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend \
          --set image.tag=${{ github.sha }}
