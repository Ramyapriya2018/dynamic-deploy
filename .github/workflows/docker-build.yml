name: Build, Push and Deploy to Dev

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ✅ 1. Checkout FIRST (VERY IMPORTANT)
      - name: Checkout repository
        uses: actions/checkout@v5

      # ✅ 2. Debug (verify folders exist)
      - name: Debug files
        run: |
          ls -la
          ls -la Backend
          ls -la Frontend

      # ✅ 3. Setup Node
      - uses: actions/setup-node@v5
        with:
          node-version: 22

      # 🔐 Docker login
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build Backend Image
      - name: Build Backend Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend:${{ github.sha }} ./Backend

      # 📦 Push Backend Image
      - name: Push Backend Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend:${{ github.sha }}

      # ☸️ Setup kubeconfig
      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # 🚀 Deploy
      - name: Deploy to Dev
        run: |
          helm upgrade --install backend-dev ./helm \
          --namespace dev \
          --create-namespace \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend \
          --set image.tag=${{ github.sha }}
