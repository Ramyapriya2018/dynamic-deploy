name: Build, Push and Deploy to Dev

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 🔐 Docker login
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 🏗 Build image (IMPORTANT: unique tag)
      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend:${{ github.sha }} ./Backend

      # 📦 Push image
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend:${{ github.sha }}

      # ☸️ Setup kubeconfig
      - name: Set kubeconfig
        run: |
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > kubeconfig
          export KUBECONFIG=$PWD/kubeconfig

      # 🚀 Deploy ONLY to DEV
      - name: Deploy to Dev
        run: |
          helm upgrade --install backend-dev ./helm \
          --namespace dev \
          --create-namespace \
          --set image.repository=${{ secrets.DOCKER_USERNAME }}/dynamic-test-backend \
          --set image.tag=${{ github.sha }}
