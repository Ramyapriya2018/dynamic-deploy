services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver
    environment:
      SA_PASSWORD: "Str0ngPass@123"
      ACCEPT_EULA: "Y"
    ports:
      - "1433:1433"
    volumes:
      - sql_data:/var/opt/mssql

  backend:
    build: ./Backend
    container_name: backend-api
    depends_on:
      - db
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=TestDeploymentDB;User Id=sa;Password=Str0ngPass@123;TrustServerCertificate=True;"

  frontend:
    build: ./Frontend
    container_name: remix-frontend
    depends_on:
      - backend
    ports:
      - "3000:3000"

volumes:
  sql_data:
